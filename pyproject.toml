[tool.pytest.ini_options]
# Restrict test collection to the canonical tests/ directory.
#
# root_backup/ contains a frozen snapshot of unrelated NMA Pro / DTA Pro
# Selenium scripts that target HTML files outside this repository (e.g.
# C:/Users/user/OneDrive - NHS/Documents/NMAhtml/nma-pro-v6.2-optimized.html).
# Those scripts contain hardcoded local paths, depend on the user's OneDrive
# layout, and are not exercises of evidence_inference. Letting pytest auto-
# collect them produces JavaScriptException failures and violates lessons.md
# "No hardcoded local paths in deployable code".
#
# `testpaths` and `norecursedirs` together prevent collection from recursing
# into root_backup/, the e156 submission assets, and other backup/auxiliary
# trees while keeping tests/ as the single source of truth for the suite.
#
# Note: pytest.ini cannot be used here because *.ini is .gitignored repo-wide.
testpaths = ["tests"]
norecursedirs = [
    "root_backup",
    "e156-submission",
    "paper",
    "docs",
    "annotations",
    "params",
    "evidence_inference",
    ".pytest_cache",
    "__pycache__",
    ".git",
]
